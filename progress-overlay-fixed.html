<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 内容生产平台 - 进度监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .progress-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            z-index: 1000;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .overlay-header {
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            color: white;
            padding: 20px;
        }

        .overlay-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .overlay-subtitle {
            font-size: 13px;
            opacity: 0.9;
        }

        .overlay-content {
            padding: 20px;
        }

        .phase-info {
            margin-bottom: 20px;
        }

        .phase-title {
            font-size: 16px;
            font-weight: 600;
            color: #1F2937;
            margin-bottom: 8px;
        }

        .phase-progress {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .progress-circle {
            width: 60px;
            height: 60px;
            position: relative;
        }

        .progress-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .progress-circle-bg {
            fill: none;
            stroke: #E5E7EB;
            stroke-width: 6;
        }

        .progress-circle-fill {
            fill: none;
            stroke: #3B82F6;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 188.4;
            stroke-dashoffset: calc(188.4 - (188.4 * var(--progress)) / 100);
            transition: stroke-dashoffset 0.5s ease;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            font-weight: 700;
            color: #1F2937;
        }

        .progress-details {
            flex: 1;
        }

        .progress-label {
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 4px;
        }

        .progress-value {
            font-size: 18px;
            font-weight: 700;
            color: #1F2937;
        }

        .progress-time {
            font-size: 12px;
            color: #9CA3AF;
            margin-top: 4px;
        }

        .agent-list {
            margin-bottom: 20px;
        }

        .agent-list-title {
            font-size: 14px;
            font-weight: 600;
            color: #4B5563;
            margin-bottom: 10px;
        }

        .agent-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #F9FAFB;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .agent-item:hover {
            background: #F3F4F6;
        }

        .agent-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        /* 可移动代理状态框 */
        .agent-status-floating {
            position: fixed;
            top: 100px;
            left: 50px;
            width: 500px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            z-index: 2000;
            transition: all 0.3s ease;
            cursor: move;
            user-select: none;
        }

        .agent-status-floating.minimized {
            width: 200px;
            height: 60px;
            top: 20px;
            right: 20px;
            left: auto;
        }

        .agent-status-floating.minimized .floating-content {
            display: none;
        }

        .agent-status-floating.minimized .floating-header {
            padding: 10px;
            cursor: pointer;
        }

        .agent-status-floating.minimized .floating-title {
            font-size: 14px;
        }

        .floating-header {
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }

        .floating-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .floating-controls {
            display: flex;
            gap: 8px;
        }

        .floating-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .floating-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .floating-content {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .agent-status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .agent-status-card {
            background: #F9FAFB;
            border-radius: 12px;
            padding: 15px;
            border-left: 4px solid #3B82F6;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .agent-status-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .agent-status-card.running {
            border-left-color: #10B981;
        }

        .agent-status-card.completed {
            border-left-color: #3B82F6;
        }

        .agent-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .agent-name {
            font-weight: 600;
            font-size: 14px;
            color: #1F2937;
        }

        .agent-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .status-running {
            background: #D1FAE5;
            color: #10B981;
        }

        .status-completed {
            background: #DBEAFE;
            color: #3B82F6;
        }

        .agent-task {
            font-size: 13px;
            color: #4B5563;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .agent-progress {
            margin-top: 10px;
        }

        .progress-bar {
            height: 6px;
            background: #E5E7EB;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3B82F6, #8B5CF6);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #6B7280;
            margin-top: 4px;
        }

        /* 通知样式 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 4000;
            animation: slideInRight 0.3s ease-out;
            border-left: 4px solid #3B82F6;
            max-width: 300px;
        }

        .notification.success {
            border-left-color: #10B981;
        }

        .notification.info {
            border-left-color: #3B82F6;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .agent-status-floating {
                width: 90%;
                left: 5%;
                right: 5%;
            }

            .agent-status-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 进度悬浮框 -->
    <div class="progress-overlay" id="progressOverlay">
        <div class="overlay-header">
            <div class="overlay-title">
                <span>🚀 AI 内容生产平台</span>
            </div>
            <div class="overlay-subtitle">第二阶段：产品设计与原型</div>
        </div>
        <div class="overlay-content">
            <div class="phase-info">
                <div class="phase-title">项目进度</div>
                <div class="phase-progress">
                    <div class="progress-circle">
                        <svg viewBox="0 0 60 60">
                            <circle class="progress-circle-bg" cx="30" cy="30" r="27"></circle>
                            <circle class="progress-circle-fill" cx="30" cy="30" r="27" style="--progress: 18"></circle>
                        </svg>
                        <div class="progress-text">18%</div>
                    </div>
                    <div class="progress-details">
                        <div class="progress-label">第二阶段进度</div>
                        <div class="progress-value">18%</div>
                        <div class="progress-time">开始: 20:00 | 预计: 00:00</div>
                    </div>
                </div>
            </div>
            <div class="agent-list">
                <div class="agent-list-title">代理状态</div>
                <div class="agent-item">
                    <span class="agent-status-dot" style="background: #10B981;"></span>
                    <span>Product Planner: 运行中 (20%)</span>
                </div>
                <div class="agent-item">
                    <span class="agent-status-dot" style="background: #10B981;"></span>
                    <span>UX/UI Designer: 运行中 (25%)</span>
                </div>
                <div class="agent-item">
                    <span class="agent-status-dot" style="background: #10B981;"></span>
                    <span>Backend Architect: 运行中 (18%)</span>
                </div>
                <div class="agent-item">
                    <span class="agent-status-dot" style="background: #10B981;"></span>
                    <span>Frontend Developer: 运行中 (22%)</span>
                </div>
                <div class="agent-item">
                    <span class="agent-status-dot" style="background: #10B981;"></span>
                    <span>AI Integration: 运行中 (15%)</span>
                </div>
                <div class="agent-item">
                    <span class="agent-status-dot" style="background: #10B981;"></span>
                    <span>Test & Quality: 运行中 (12%)</span>
                </div>
            </div>
            <div class="controls">
                <button style="padding: 10px 20px; background: #3B82F6; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-right: 10px;" onclick="updateProgress()">刷新进度</button>
                <button style="padding: 10px 20px; background: #F3F4F6; color: #374151; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;" onclick="showDetails()">查看详情</button>
            </div>
        </div>
    </div>

    <!-- 可移动代理状态悬浮框 -->
    <div class="agent-status-floating" id="agentStatusFloating">
        <div class="floating-header">
            <div class="floating-title">
                <span>🤖 代理实时状态</span>
            </div>
            <div class="floating-controls">
                <button class="floating-btn" onclick="refreshAgentStatus()">🔄</button>
                <button class="floating-btn" onclick="toggleMinimize()">➖</button>
                <button class="floating-btn" onclick="closeFloating()">✕</button>
            </div>
        </div>
        <div class="floating-content" id="floatingContent">
            <div class="agent-status-grid" id="agentStatusGrid">
                <!-- 代理状态卡片将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <script>
        // 代理状态数据
        const agentStatusData = {
            'product-planner': {
                name: 'Product Planner',
                status: 'running',
                progress: 20,
                task: '设计需求评审和优先级确认',
                eta: '20:30'
            },
            'ux-designer': {
                name: 'UX/UI Designer',
                status: 'running',
                progress: 25,
                task: '设计系统完善和页面设计',
                eta: '21:30'
            },
            'backend-arch': {
                name: 'Backend Architect',
                status: 'running',
                progress: 18,
                task: '技术可行性验证和API完善',
                eta: '21:00'
            },
            'frontend-dev': {
                name: 'Frontend Developer',
                status: 'running',
                progress: 22,
                task: '前端架构验证和组件设计',
                eta: '20:45'
            },
            'ai-specialist': {
                name: 'AI Integration Specialist',
                status: 'running',
                progress: 15,
                task: 'AI模型API测试和成本优化',
                eta: '21:15'
            },
            'test-quality': {
                name: 'Test & Quality',
                status: 'running',
                progress: 12,
                task: '测试计划制定和工具配置',
                eta: '21:20'
            },
            'supervisor': {
                name: 'Supervisor',
                status: 'completed',
                progress: 100,
                task: '项目协调和进度监控',
                eta: '持续'
            }
        };

        // 拖拽功能
        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };
        const floatingBox = document.getElementById('agentStatusFloating');

        floatingBox.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', stopDrag);

        function startDrag(e) {
            if (e.target.closest('.floating-btn')) return;
            
            isDragging = true;
            const rect = floatingBox.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
            floatingBox.style.cursor = 'grabbing';
        }

        function drag(e) {
            if (!isDragging) return;
            
            e.preventDefault();
            floatingBox.style.left = (e.clientX - dragOffset.x) + 'px';
            floatingBox.style.top = (e.clientY - dragOffset.y) + 'px';
        }

        function stopDrag() {
            isDragging = false;
            floatingBox.style.cursor = 'move';
        }

        // 切换最小化
        function toggleMinimize() {
            floatingBox.classList.toggle('minimized');
            const minimizeBtn = document.querySelector('.floating-btn:nth-child(2)');
            minimizeBtn.textContent = floatingBox.classList.contains('minimized') ? '➕' : '➖';
            
            if (floatingBox.classList.contains('minimized')) {
                updateMinimizedStatus();
            }
        }

        // 关闭悬浮框
        function closeFloating() {
            floatingBox.style.display = 'none';
        }

        // 刷新代理状态
        function refreshAgentStatus() {
            updateAgentStatusDisplay();
            showNotification('代理状态已刷新', '最新状态已更新', 'success');
        }

        // 更新代理状态显示
        function updateAgentStatusDisplay() {
            const grid = document.getElementById('agentStatusGrid');
            if (!grid) return;

            grid.innerHTML = '';

            Object.keys(agentStatusData).forEach(agentId => {
                const agent = agentStatusData[agentId];
                const statusClass = `status-${agent.status}`;
                const cardClass = `agent-status-card ${agent.status}`;
                
                const card = document.createElement('div');
                card.className = cardClass;
                card.innerHTML = `
                    <div class="agent-card-header">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-status ${statusClass}">${getStatusText(agent.status)}</div>
                    </div>
                    <div class="agent-task">${agent.task}</div>
                    <div class="agent-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${agent.progress}%"></div>
                        </div>
                        <div class="progress-info">
                            <span>${agent.progress}%</span>
                            <span>ETA: ${agent.eta}</span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // 更新最小化状态
        function updateMinimizedStatus() {
            const header = floatingBox.querySelector('.floating-header');
            if (!floatingBox.classList.contains('minimized')) return;

            const runningCount = Object.values(agentStatusData).filter(a => a.status === 'running').length;
            const totalCount = Object.keys(agentStatusData).length;
            
            header.innerHTML = `
                <div class="floating-title">
                    <span>🤖 ${runningCount}/${totalCount} 运行中</span>
                </div>
                <div class="floating-controls">
                    <button class="floating-btn" onclick="toggleMinimize()">➕</button>
                </div>
            `;
        }

        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'running': '运行中',
                'completed': '已完成',
                'pending': '待开始'
            };
            return statusMap[status] || status;
        }

        // 显示通知
        function showNotification(title, message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <div class="notification-title">${title}</div>
                <div class="notification-message">${message}</div>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // 模拟状态更新
        function simulateAgentProgress() {
            Object.keys(agentStatusData).forEach(agentId => {
                if (agentId === 'supervisor') return;
                
                const agent = agentStatusData[agentId];
                if (agent.status === 'running') {
                    // 随机增加进度
                    const increment = Math.floor(Math.random() * 3) + 1;
                    agent.progress = Math.min(100, agent.progress + increment);
                    
                    // 如果进度达到100%，标记为完成
                    if (agent.progress >= 100) {
                        agent.status = 'completed';
                        agent.progress = 100;
                        showNotification(`${agent.name} 完成`, `${agent.task} 已完成`, 'success');
                    }
                }
            });
            
            updateAgentStatusDisplay();
            if (floatingBox.classList.contains('minimized')) {
                updateMinimizedStatus();
            }
        }

        // 初始化悬浮框
        function initFloatingBox() {
            updateAgentStatusDisplay();
            
            // 每30秒更新一次进度
            setInterval(simulateAgentProgress, 30000);
            
            // 每5分钟刷新一次状态
            setInterval(refreshAgentStatus, 300000);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initFloatingBox);

        // 进度监控相关函数
        function updateProgress() {
            showNotification('进度已更新', '项目进度已刷新', 'info');
        }

        function showDetails() {
            showNotification('查看详情', '正在加载详细进度信息...', 'info');
        }
    </script>
</body>
</html>
