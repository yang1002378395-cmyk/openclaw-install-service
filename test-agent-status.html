<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 - 代理状态悬浮框</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* 可移动代理状态框 */
        .agent-status-floating {
            position: fixed;
            top: 100px;
            left: 50px;
            width: 500px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            z-index: 2000;
            transition: all 0.3s ease;
            cursor: move;
            user-select: none;
        }

        .agent-status-floating.minimized {
            width: 200px;
            height: 60px;
            top: 20px;
            right: 20px;
            left: auto;
        }

        .agent-status-floating.minimized .floating-content {
            display: none;
        }

        .agent-status-floating.minimized .floating-header {
            padding: 10px;
            cursor: pointer;
        }

        .agent-status-floating.minimized .floating-title {
            font-size: 14px;
        }

        .floating-header {
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }

        .floating-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .floating-controls {
            display: flex;
            gap: 8px;
        }

        .floating-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .floating-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .floating-content {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .agent-status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .agent-status-card {
            background: #F9FAFB;
            border-radius: 12px;
            padding: 15px;
            border-left: 4px solid #3B82F6;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .agent-status-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .agent-status-card.running {
            border-left-color: #10B981;
        }

        .agent-status-card.completed {
            border-left-color: #3B82F6;
        }

        .agent-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .agent-name {
            font-weight: 600;
            font-size: 14px;
            color: #1F2937;
        }

        .agent-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .status-running {
            background: #D1FAE5;
            color: #10B981;
        }

        .agent-task {
            font-size: 13px;
            color: #4B5563;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .agent-progress {
            margin-top: 10px;
        }

        .progress-bar {
            height: 6px;
            background: #E5E7EB;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3B82F6, #8B5CF6);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #6B7280;
            margin-top: 4px;
        }

        /* 通知样式 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 4000;
            animation: slideInRight 0.3s ease-out;
            border-left: 4px solid #3B82F6;
            max-width: 300px;
        }

        .notification.success {
            border-left-color: #10B981;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <h1 style="color: white; text-align: center; margin-top: 50px;">测试页面 - 代理状态悬浮框</h1>
    <p style="color: white; text-align: center; opacity: 0.8;">你应该能看到左上角有一个可移动的悬浮框</p>

    <!-- 可移动代理状态悬浮框 -->
    <div class="agent-status-floating" id="agentStatusFloating">
        <div class="floating-header">
            <div class="floating-title">
                <span>🤖 代理实时状态</span>
            </div>
            <div class="floating-controls">
                <button class="floating-btn" onclick="refreshAgentStatus()">🔄</button>
                <button class="floating-btn" onclick="toggleMinimize()">➖</button>
                <button class="floating-btn" onclick="closeFloating()">✕</button>
            </div>
        </div>
        <div class="floating-content" id="floatingContent">
            <div class="agent-status-grid" id="agentStatusGrid">
                <!-- 代理状态卡片将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <script>
        // 代理状态数据
        const agentStatusData = {
            'product-planner': {
                name: 'Product Planner',
                status: 'running',
                progress: 20,
                task: '设计需求评审和优先级确认',
                eta: '20:30'
            },
            'ux-designer': {
                name: 'UX/UI Designer',
                status: 'running',
                progress: 25,
                task: '设计系统完善和页面设计',
                eta: '21:30'
            },
            'backend-arch': {
                name: 'Backend Architect',
                status: 'running',
                progress: 18,
                task: '技术可行性验证和API完善',
                eta: '21:00'
            },
            'frontend-dev': {
                name: 'Frontend Developer',
                status: 'running',
                progress: 22,
                task: '前端架构验证和组件设计',
                eta: '20:45'
            }
        };

        // 拖拽功能
        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };
        const floatingBox = document.getElementById('agentStatusFloating');

        floatingBox.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', stopDrag);

        function startDrag(e) {
            if (e.target.closest('.floating-btn')) return;
            
            isDragging = true;
            const rect = floatingBox.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
            floatingBox.style.cursor = 'grabbing';
        }

        function drag(e) {
            if (!isDragging) return;
            
            e.preventDefault();
            floatingBox.style.left = (e.clientX - dragOffset.x) + 'px';
            floatingBox.style.top = (e.clientY - dragOffset.y) + 'px';
        }

        function stopDrag() {
            isDragging = false;
            floatingBox.style.cursor = 'move';
        }

        // 切换最小化
        function toggleMinimize() {
            floatingBox.classList.toggle('minimized');
            const minimizeBtn = document.querySelector('.floating-btn:nth-child(2)');
            minimizeBtn.textContent = floatingBox.classList.contains('minimized') ? '➕' : '➖';
        }

        // 关闭悬浮框
        function closeFloating() {
            floatingBox.style.display = 'none';
        }

        // 刷新代理状态
        function refreshAgentStatus() {
            updateAgentStatusDisplay();
            showNotification('代理状态已刷新', '最新状态已更新', 'success');
        }

        // 更新代理状态显示
        function updateAgentStatusDisplay() {
            const grid = document.getElementById('agentStatusGrid');
            if (!grid) return;

            grid.innerHTML = '';

            Object.keys(agentStatusData).forEach(agentId => {
                const agent = agentStatusData[agentId];
                const statusClass = `status-${agent.status}`;
                const cardClass = `agent-status-card ${agent.status}`;
                
                const card = document.createElement('div');
                card.className = cardClass;
                card.innerHTML = `
                    <div class="agent-card-header">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-status ${statusClass}">运行中</div>
                    </div>
                    <div class="agent-task">${agent.task}</div>
                    <div class="agent-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${agent.progress}%"></div>
                        </div>
                        <div class="progress-info">
                            <span>${agent.progress}%</span>
                            <span>ETA: ${agent.eta}</span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // 显示通知
        function showNotification(title, message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <div class="notification-title">${title}</div>
                <div class="notification-message">${message}</div>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // 初始化
        function init() {
            updateAgentStatusDisplay();
            
            // 每30秒更新一次进度
            setInterval(() => {
                Object.keys(agentStatusData).forEach(agentId => {
                    const agent = agentStatusData[agentId];
                    if (agent.status === 'running') {
                        const increment = Math.floor(Math.random() * 3) + 1;
                        agent.progress = Math.min(100, agent.progress + increment);
                    }
                });
                updateAgentStatusDisplay();
            }, 30000);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
